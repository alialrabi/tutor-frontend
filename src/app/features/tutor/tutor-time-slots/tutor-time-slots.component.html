<div class="container my-5">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bold">Book a Session</h1>
    <p class="lead text-muted">Select an available time slot from the tutor's schedule.</p>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger shadow-sm">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="schedule-container">
    <div class="schedule-grid">
      <div *ngFor="let schedule of dailySchedules" class="day-column">
        <div class="day-header">
          <div class="day-of-week">{{ schedule.date | date:'EEEE' }}</div>
          <div class="date-of-month">{{ schedule.date | date:'MMM d' }}</div>
        </div>
        <div class="slots-list">
          <div *ngIf="schedule.slots.length > 0; else noSlots">
            <div *ngFor="let slot of schedule.slots" class="slot-item">
              <button class="btn btn-outline-primary w-100" [disabled]="slot.isReserved" (click)="bookSession(slot)">
                {{ slot.startTime | slice:0:5 }} - {{ slot.endTime | slice:0:5 }}
              </button>
            </div>
          </div>
          <ng-template #noSlots>
            <div class="no-slots-message">
              No availability
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
