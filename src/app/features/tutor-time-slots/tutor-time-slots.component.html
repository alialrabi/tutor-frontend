<div class="container my-5">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bold">Available Time Slots</h1>
    <p class="lead text-muted">Choose a time that works for you and book your session.</p>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger shadow-sm">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div *ngFor="let slot of timeSlots" class="col">
      <div class="card h-100 shadow-sm border-0" [class.reserved]="slot.isReserved">
        <div class="card-body text-center">
          <div class="time-slot-icon mb-3">
            <i class="bi bi-calendar-check"></i>
          </div>
          <h5 class="card-title">{{ slot.startTime | date:'shortTime' }} - {{ slot.endTime | date:'shortTime' }}</h5>
          <p class="card-text text-muted">{{ slot.startTime | date:'longDate' }}</p>

          <div *ngIf="!slot.isReserved; else reservedBadge">
            <button class="btn btn-primary" (click)="reserveSlot(slot)">
              Reserve Slot
            </button>
          </div>
          <ng-template #reservedBadge>
            <span class="badge bg-secondary">Reserved</span>
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && timeSlots.length === 0" class="text-center mt-5">
    <i class="bi bi-calendar-x display-4 text-muted"></i>
    <h3 class="mt-3">No Available Slots</h3>
    <p class="text-muted">Please check back later for new openings.</p>
  </div>
</div>
