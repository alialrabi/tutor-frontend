<header class="navbar-preply">
  <div class="container">
    <div class="navbar-left">
      <a routerLink="/" class="navbar-brand">Tutor</a>
      <nav class="navbar-nav">
        @if (!tutorId) {

        }

        @if (currentUser) {
          @if (tutorId) {
            <a [routerLink]="['/sessions/tutor', tutorId]" class="nav-link">My Sessions</a>
            <a routerLink="/create-time-slot" class="nav-link">Availability</a>
            <a routerLink="/profile" class="nav-link">My Profile</a>
          } @else {
              <a routerLink="/" class="nav-link">Find Tutors</a>
              <a [routerLink]="['/sessions/user', userId]" class="nav-link">My Sessions</a>
              <a routerLink="/tutor/register" class="nav-link become-tutor">Become a Tutor</a>
          }
        }
      </nav>
    </div>

    <div class="navbar-right">
      @if (currentUser) {
        <div class="user-menu">
          <!-- Language Dropdown -->
          <div class="lang-dropdown">
            <button class="lang-btn" (click)="toggleLangDropdown()">
              <i class="bi bi-globe"></i>
              <span>{{ currentLang === 'en' ? 'English' : 'العربية' }}</span>
              <i class="bi bi-chevron-down"></i>
            </button>
            @if (showLangDropdown) {
              <div class="lang-dropdown-content">
                <a (click)="changeLanguage('en')">English</a>
                <a (click)="changeLanguage('ar')">العربية</a>
              </div>
            }
          </div>

          <div class="separator"></div>

          <button class="btn-logout" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i> Log out
          </button>
        </div>
      } @else {
        <div class="lang-dropdown">
            <button class="lang-btn" (click)="toggleLangDropdown()">
              <i class="bi bi-globe"></i>
              <span>{{ currentLang === 'en' ? 'English' : 'العربية' }}</span>
              <i class="bi bi-chevron-down"></i>
            </button>
            @if (showLangDropdown) {
              <div class="lang-dropdown-content">
                <a (click)="changeLanguage('en')">English</a>
                <a (click)="changeLanguage('ar')">العربية</a>
              </div>
            }
          </div>
        <a routerLink="/auth/login" class="nav-link">Log in</a>
        <a routerLink="/auth/register" class="btn btn-primary">Sign up</a>
      }
    </div>
  </div>
</header>
